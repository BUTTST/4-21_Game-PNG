<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>SVG 轉 PNG 工具 (Neon Pulse)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #111;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        h1 {
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
        }

        .container {
            background: #222;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            text-align: center;
        }

        .btn {
            background: #ff0055;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            box-shadow: 0 0 15px #ff0055;
            transform: scale(1.05);
        }

        canvas {
            display: none;
        }

        img {
            max-width: 256px;
            margin: 20px 0;
            border: 1px solid #444;
            border-radius: 20px;
        }
    </style>
</head>

<body>
    <h1>SVG 轉 PNG 輸出工具</h1>
    <div class="container">
        <p>此工具會讀取同目錄下的 <b>icon.svg</b>，並自動生成遊戲/網頁常用的 PNG 尺寸。</p>
        <div id="preview"></div>
        <input type="file" id="fileInput" accept=".svg" class="btn" style="background:#444;" />
        <br>
        <button class="btn" onclick="generatePNGs()">一鍵下載所有尺寸 (16, 32, 64, 128, 256, 512)</button>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const sizes = [16, 32, 64, 128, 256, 512];
        let currentSvgUrl = null;

        document.getElementById('fileInput').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (event) {
                currentSvgUrl = event.target.result;
                const img = new Image();
                img.src = currentSvgUrl;
                document.getElementById('preview').innerHTML = '';
                document.getElementById('preview').appendChild(img);
            };
            reader.readAsDataURL(file);
        });

        // 預設嘗試載入 icon.svg
        fetch('icon.svg').then(res => res.text()).then(svgText => {
            const blob = new Blob([svgText], { type: 'image/svg+xml' });
            currentSvgUrl = URL.createObjectURL(blob);
            const img = new Image();
            img.src = currentSvgUrl;
            document.getElementById('preview').appendChild(img);
        }).catch(e => console.log('找不到預設 icon.svg，請手動選擇'));

        function generatePNGs() {
            if (!currentSvgUrl) {
                alert('請先選擇一個 SVG 檔案！');
                return;
            }

            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();

            img.onload = function () {
                sizes.forEach(size => {
                    canvas.width = size;
                    canvas.height = size;
                    ctx.clearRect(0, 0, size, size);
                    ctx.drawImage(img, 0, 0, size, size);

                    const a = document.createElement('a');
                    a.download = `icon_${size}x${size}.png`;
                    a.href = canvas.toDataURL('image/png');
                    a.click();
                });
            };
            img.src = currentSvgUrl;
        }
    </script>
</body>

</html>
