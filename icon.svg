<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a20" />
      <stop offset="100%" stop-color="#1a0b2e" />
    </linearGradient>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="16" result="blur2" />
      <feGaussianBlur stdDeviation="32" result="blur3" />
      <feMerge>
        <feMergeNode in="blur3" />
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)" />
  <rect width="480" height="480" x="16" y="16" rx="84" fill="none" stroke="#ff0055" stroke-width="4" opacity="0.3" />
  
  <path d="M 64,256 L 160,256 L 208,128 L 304,384 L 352,256 L 448,256" 
        fill="none" 
        stroke="#00ffff" 
        stroke-width="24" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#neonGlow)" />
</svg>
