<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Pulse | 幾何生存</title>
    <style>
        :root {
            --primary: #00ffff;
            --secondary: #ff00ff;
            --accent: #ffff00;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --font-main: 'Orbitron', 'Inter', sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Glassmorphism UI */
        #ui-layer {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            width: 100%;
            height: 100%;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.6) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            transition: opacity 0.5s ease;
            pointer-events: all;
        }

        .card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 90%;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            letter-spacing: 5px;
        }

        p {
            font-family: 'Inter';
            margin-bottom: 2rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.8);
        }

        .btn {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 1rem 3rem;
            font-family: var(--font-main);
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: var(--primary);
            color: var(--bg);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
            transform: scale(1.05);
        }

        #hud {
            position: absolute;
            top: 2rem;
            left: 2rem;
            right: 2rem;
            display: flex;
            justify-content: space-between;
            font-family: var(--font-main);
            font-size: 1.5rem;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .hidden {
            display: none !important;
            opacity: 0 !important;
        }

        .high-score {
            font-size: 0.9rem;
            color: var(--secondary);
            margin-top: 10px;
        }

        /* XP Bar */
        #xp-bar-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 20;
        }

        #xp-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #a200ff);
            box-shadow: 0 0 10px var(--primary);
            transition: width 0.3s ease;
        }

        /* Level Up Overlay */
        #level-up-screen {
            pointer-events: all;
        }

        .skill-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
            width: 100%;
        }

        .skill-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.2);
            padding: 1.5rem;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .skill-card:hover {
            background: rgba(0, 255, 255, 0.1);
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 255, 255, 0.2);
        }

        .skill-name {
            color: var(--primary);
            font-weight: bold;
            display: block;
            margin-bottom: 0.5rem;
        }

        .skill-desc {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            font-family: 'Inter';
        }

        .settings {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        input[type="range"] {
            accent-color: var(--primary);
            cursor: pointer;
        }
    </style>
</head>

<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="start-screen" class="overlay">
            <div class="card">
                <h1>NEON PULSE</h1>
                <p>閃匿於幾何深淵之中。移動以自動射擊。收集能量晶體以進化系統。</p>
                <button class="btn" onclick="startGame()">同步核心</button>
                <div class="settings">
                    經驗倍率: <input type="range" id="xp-mult" min="1" max="10" value="1" step="1"
                        oninput="updateXpLabel(this.value)">
                    <span id="xp-val">1x</span>
                </div>
                <div class="high-score" id="menu-highscore">最高紀錄: 0</div>
            </div>
        </div>

        <div id="level-up-screen" class="overlay hidden">
            <div class="card" style="max-width: 600px;">
                <h1 style="font-size: 2.5rem;">核心進化</h1>
                <p>選擇一項核心增益以強化系統連動。</p>
                <div class="skill-grid" id="skill-options">
                    <!-- Skills will be injected here -->
                </div>
            </div>
        </div>

        <div id="game-over-screen" class="overlay hidden">
            <div class="card">
                <h1
                    style="background: linear-gradient(45deg, #ff0000, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    CORE FAIL</h1>
                <p>能量核心已崩潰。系統重新校準中。</p>
                <h2 id="final-score" style="font-size: 2rem; margin-bottom: 2rem;">分數: 0</h2>
                <button class="btn" style="border-color: var(--secondary); color: var(--secondary);"
                    onclick="startGame()">重啟序列</button>
            </div>
        </div>

        <div id="hud">
            <div id="score">SCORE: 0000</div>
            <div id="level-hud">LV. 1</div>
            <div id="shield-hud">SHIELD: 100%</div>
            <div id="lives">CORE: STABLE</div>
        </div>
        <div id="xp-bar-container">
            <div id="xp-bar-fill"></div>
        </div>
    </div>

    <script>
        /** @type {HTMLCanvasElement} */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const hud = document.getElementById('hud');

        // Game State
        let gameState = 'MENU'; // MENU, PLAYING, GAMEOVER, LEVELING
        let score = 0;
        let highScore = localStorage.getItem('neon_pulse_highscore') || 0;
        let frames = 0;
        let xpMultiplier = 1;

        // Player System
        const player = {
            x: window.innerWidth / 2,
            y: window.innerHeight / 2,
            radius: 15,
            targetX: window.innerWidth / 2,
            targetY: window.innerHeight / 2,
            color: '#00ffff',
            fireRate: 8,
            lastFire: 0,
            level: 1,
            xp: 0,
            xpToNext: 100,

            // Stats & Skills
            moveSpeed: 0.15,
            projectileCount: 1,
            piercing: 0,
            damage: 1,
            knockback: 0,

            // Shield System
            shield: 100,
            maxShield: 100,
            shieldRegen: 0.1,
            lastHit: 0,

            // Aiming
            aimAngle: 0
        };

        const SKILLS = [
            { id: 'multishot', name: '多重射擊', desc: '增加額外彈幕', max: 5 },
            { id: 'pierce', name: '貫穿核心', desc: '能量彈可貫穿敵體', max: 3 },
            { id: 'speed', name: '超載引擎', desc: '提升機動速度', max: 5 },
            { id: 'firerate', name: '脈衝加速', desc: '提升核心射速', max: 8 },
            { id: 'pulse', name: '能量震盪', desc: '增加擊退效果', max: 5 }
        ];

        // Entities
        let projectiles = [];
        let enemies = [];
        let particles = [];
        let xpGems = [];
        let enemySpawnRate = 60;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // Input
        window.addEventListener('mousemove', (e) => {
            player.targetX = e.clientX;
            player.targetY = e.clientY;
            player.aimAngle = Math.atan2(e.clientY - player.y, e.clientX - player.x);
        });

        window.addEventListener('touchmove', (e) => {
            player.targetX = e.touches[0].clientX;
            player.targetY = e.touches[0].clientY;
            player.aimAngle = Math.atan2(e.touches[0].clientY - player.y, e.touches[0].clientX - player.x);
            e.preventDefault();
        }, { passive: false });

        document.getElementById('menu-highscore').innerText = `最高紀錄: ${highScore}`;

        function updateXpLabel(v) {
            document.getElementById('xp-val').innerText = v + 'x';
            xpMultiplier = parseInt(v);
        }

        function startGame() {
            gameState = 'PLAYING';
            score = 0;
            projectiles = [];
            enemies = [];
            particles = [];
            xpGems = [];
            enemySpawnRate = 60;
            frames = 0;

            // Stats Reset
            player.level = 1;
            player.xp = 0;
            player.xpToNext = 100;
            player.fireRate = 10;
            player.moveSpeed = 0.15;
            player.projectileCount = 1;
            player.piercing = 0;
            player.knockback = 0;
            player.shield = 100;
            player.maxShield = 100;
            player.shieldRegen = 0.1;

            updateHUD();
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('level-up-screen').classList.add('hidden');
            hud.classList.remove('hidden');
            hud.style.opacity = 1;

            spawnParticle(player.x, player.y, player.color, 20);
        }

        function updateHUD() {
            scoreEl.innerText = `SCORE: ${score.toString().padStart(5, '0')}`;
            document.getElementById('level-hud').innerText = `LV. ${player.level}`;
            document.getElementById('shield-hud').innerText = `SHIELD: ${Math.ceil(player.shield)}%`;
            const xpPercent = (player.xp / player.xpToNext) * 100;
            document.getElementById('xp-bar-fill').style.width = xpPercent + '%';

            if (player.shield < 30) {
                document.getElementById('shield-hud').style.color = '#ff0000';
            } else {
                document.getElementById('shield-hud').style.color = 'var(--primary)';
            }
        }

        function gainXP(amount) {
            player.xp += amount * xpMultiplier;
            if (player.xp >= player.xpToNext) {
                player.xp -= player.xpToNext;
                player.level++;
                player.xpToNext = Math.floor(player.xpToNext * 1.2) + 50;
                showLevelUp();
            }
            updateHUD();
        }

        function showLevelUp() {
            gameState = 'LEVELING';
            document.getElementById('level-up-screen').classList.remove('hidden');

            const skillContainer = document.getElementById('skill-options');
            skillContainer.innerHTML = '';

            // Randomly pick 3 skills
            const shuffled = [...SKILLS].sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, 3);

            selected.forEach(skill => {
                const card = document.createElement('div');
                card.className = 'skill-card';
                card.innerHTML = `
                    <span class="skill-name">${skill.name}</span>
                    <span class="skill-desc">${skill.desc}</span>
                `;
                card.onclick = () => applySkill(skill.id);
                skillContainer.appendChild(card);
            });
        }

        function applySkill(id) {
            switch (id) {
                case 'multishot': player.projectileCount++; break;
                case 'pierce': player.piercing++; break;
                case 'speed': player.moveSpeed += 0.05; break;
                case 'firerate': player.fireRate = Math.max(3, player.fireRate - 1); break;
                case 'pulse': player.knockback += 2; break;
            }

            gameState = 'PLAYING';
            document.getElementById('level-up-screen').classList.add('hidden');
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('neon_pulse_highscore', highScore);
            }
            document.getElementById('game-over-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = `分數: ${score}`;
            document.getElementById('menu-highscore').innerText = `最高紀錄: ${highScore}`;
            hud.style.opacity = 0;
        }

        // Classes
        class Projectile {
            constructor(x, y, angle) {
                this.x = x;
                this.y = y;
                this.radius = 3.5;
                this.speed = 14;
                this.vx = Math.cos(angle) * this.speed;
                this.vy = Math.sin(angle) * this.speed;
                this.color = player.color;
                this.piercing = player.piercing;
                this.hitEnemies = new Set();
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class XPGem {
            constructor(x, y, value) {
                this.x = x;
                this.y = y;
                this.radius = 4;
                this.value = value;
                this.color = '#a200ff';
                this.pulling = false;
            }
            update() {
                const dist = Math.hypot(player.x - this.x, player.y - this.y);
                if (dist < 150) this.pulling = true;

                if (this.pulling) {
                    const angle = Math.atan2(player.y - this.y, player.x - this.x);
                    this.x += Math.cos(angle) * 10;
                    this.y += Math.sin(angle) * 10;
                }
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 5;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y - this.radius);
                ctx.lineTo(this.x + this.radius, this.y);
                ctx.lineTo(this.x, this.y + this.radius);
                ctx.lineTo(this.x - this.radius, this.y);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        class Enemy {
            constructor(type = 'basic') {
                this.type = type;
                this.radius = 15;
                this.health = 1;
                this.xpValue = 20;

                if (type === 'fast') {
                    this.radius = 10;
                    this.speedMult = 1.8;
                    this.color = '#00ff00';
                    this.sides = 3;
                    this.xpValue = 15;
                } else if (type === 'tank') {
                    this.radius = 25;
                    this.speedMult = 0.6;
                    this.color = '#ff0000';
                    this.sides = 6;
                    this.health = 5 + Math.floor(score / 5000);
                    this.xpValue = 100;
                } else if (type === 'swarm') {
                    this.radius = 8;
                    this.speedMult = 1.4;
                    this.color = '#ffff00';
                    this.sides = 4;
                    this.xpValue = 10;
                } else {
                    this.radius = 15;
                    this.speedMult = 1.0;
                    this.color = '#ff00ff';
                    this.sides = 4;
                }

                if (Math.random() < 0.5) {
                    this.x = Math.random() < 0.5 ? -this.radius : canvas.width + this.radius;
                    this.y = Math.random() * canvas.height;
                } else {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() < 0.5 ? -this.radius : canvas.height + this.radius;
                }

                this.speed = (Math.random() * 2 + 1) * this.speedMult + (score / 2000);
                this.vx = 0;
                this.vy = 0;
                this.rot = 0;
                this.rotSpeed = (Math.random() - 0.5) * 0.1;
            }
            update() {
                const targetAngle = Math.atan2(player.y - this.y, player.x - this.x);
                this.vx += Math.cos(targetAngle) * 0.08;
                this.vy += Math.sin(targetAngle) * 0.08;

                const currentSpeed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (currentSpeed > this.speed) {
                    this.vx = (this.vx / currentSpeed) * this.speed;
                    this.vy = (this.vy / currentSpeed) * this.speed;
                }

                this.x += this.vx;
                this.y += this.vy;
                this.rot += this.rotSpeed;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rot);
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 3;

                ctx.beginPath();
                for (let i = 0; i < this.sides; i++) {
                    const angle = (i / this.sides) * Math.PI * 2;
                    const px = Math.cos(angle) * this.radius;
                    const py = Math.sin(angle) * this.radius;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.stroke();

                // Core glow
                ctx.globalAlpha = 0.2;
                ctx.fillStyle = this.color;
                ctx.fill();

                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.radius = Math.random() * 3;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.01;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function spawnParticle(x, y, color, count = 5) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function animate() {
            frames++;
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)'; // Motion blur effect
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameState === 'PLAYING' || gameState === 'LEVELING') {
                // Player movement
                if (gameState === 'PLAYING') {
                    player.x += (player.targetX - player.x) * player.moveSpeed;
                    player.y += (player.targetY - player.y) * player.moveSpeed;

                    // Shield Regen
                    if (frames - player.lastHit > 180) { // 3 seconds no hit
                        player.shield = Math.min(player.maxShield, player.shield + player.shieldRegen);
                    }
                }

                // Draw pulses behind player
                ctx.save();
                ctx.globalAlpha = 0.15;
                ctx.strokeStyle = player.color;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.radius + Math.sin(frames * 0.1) * 8, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();

                // Draw Player
                ctx.save();
                ctx.translate(player.x, player.y);
                ctx.rotate(player.aimAngle + Math.PI / 2);
                ctx.shadowBlur = 25;
                ctx.shadowColor = player.color;
                ctx.strokeStyle = player.color;
                ctx.lineWidth = 4;

                ctx.beginPath();
                ctx.moveTo(0, -player.radius);
                ctx.lineTo(player.radius, player.radius);
                ctx.lineTo(0, player.radius * 0.5);
                ctx.lineTo(-player.radius, player.radius);
                ctx.closePath();
                ctx.stroke();

                // Draw Shield Circle
                if (player.shield > 0) {
                    ctx.beginPath();
                    ctx.arc(0, 0, player.radius + 10, 0, Math.PI * 2);
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = `rgba(0, 255, 255, ${player.shield / 100 * 0.5})`;
                    ctx.stroke();

                    if (player.shield < 100) {
                        ctx.beginPath();
                        ctx.arc(0, 0, player.radius + 10, -Math.PI / 2, -Math.PI / 2 + (player.shield / 100) * Math.PI * 2);
                        ctx.lineWidth = 4;
                        ctx.strokeStyle = player.color;
                        ctx.stroke();
                    }
                }
                ctx.restore();

                if (gameState === 'LEVELING') {
                    requestAnimationFrame(animate);
                    return;
                }

                // Auto Shooting
                if (frames % player.fireRate === 0) {
                    const baseAngle = player.aimAngle;
                    const spread = 0.2;
                    for (let i = 0; i < player.projectileCount; i++) {
                        const angle = baseAngle + (i - (player.projectileCount - 1) / 2) * spread;
                        projectiles.push(new Projectile(player.x, player.y, angle));
                    }
                }

                // Update Projectiles
                projectiles = projectiles.filter(p => {
                    p.update();
                    p.draw();
                    return p.x > 0 && p.x < canvas.width && p.y > 0 && p.y < canvas.height;
                });

                // Spawn Enemies
                if (frames % Math.max(8, Math.floor(enemySpawnRate - score / 1000)) === 0) {
                    const rand = Math.random();
                    let type = 'basic';
                    if (rand < 0.1) type = 'tank';
                    else if (rand < 0.25) type = 'fast';
                    else if (rand < 0.4) type = 'swarm';

                    if (type === 'swarm') {
                        // Spawn a cluster
                        for (let i = 0; i < 3; i++) {
                            enemies.push(new Enemy(type));
                        }
                    } else {
                        enemies.push(new Enemy(type));
                    }
                }

                // Update XP Gems
                xpGems = xpGems.filter(gem => {
                    gem.update();
                    gem.draw();
                    const dist = Math.hypot(gem.x - player.x, gem.y - player.y);
                    if (dist < player.radius + gem.radius) {
                        gainXP(gem.value);
                        return false;
                    }
                    return true;
                });

                // Update Enemies
                enemies = enemies.filter((e, eIndex) => {
                    e.update();
                    e.draw();

                    // Collision with Player
                    const dist = Math.hypot(e.x - player.x, e.y - player.y);
                    if (dist < e.radius + player.radius + (player.shield > 0 ? 10 : 0)) {
                        if (player.shield > 0) {
                            player.shield -= 25;
                            player.lastHit = frames;
                            spawnParticle(e.x, e.y, player.color, 10);
                            enemies.splice(eIndex, 1);
                        } else {
                            spawnParticle(player.x, player.y, player.color, 30);
                            gameOver();
                        }
                        return true;
                    }

                    // Collision with Projectiles
                    projectiles.forEach((p, pIndex) => {
                        if (p.hitEnemies.has(e)) return;
                        const distP = Math.hypot(e.x - p.x, e.y - p.y);
                        if (distP < e.radius + p.radius) {
                            // Hit!
                            e.health -= player.damage;
                            p.hitEnemies.add(e);

                            // Knockback
                            if (player.knockback > 0) {
                                const kAngle = Math.atan2(e.y - p.y, e.x - p.x);
                                e.vx += Math.cos(kAngle) * player.knockback;
                                e.vy += Math.sin(kAngle) * player.knockback;
                            }

                            if (e.health <= 0) {
                                score += e.xpValue;
                                spawnParticle(e.x, e.y, e.color, 15);
                                xpGems.push(new XPGem(e.x, e.y, e.xpValue));
                                enemies.splice(eIndex, 1);
                            }

                            if (p.hitEnemies.size > p.piercing) {
                                projectiles.splice(pIndex, 1);
                            }
                        }
                    });

                    return true;
                });

                updateHUD();
            }

            // Update Particles
            particles = particles.filter(p => {
                p.update();
                p.draw();
                return p.alpha > 0;
            });

            // Decor: Background particles
            if (frames % 10 === 0) {
                particles.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height, 'rgba(255,255,255,0.1)'));
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
